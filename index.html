/* ═══════════════════════════════════════════════════════
   API HELPERS
═══════════════════════════════════════════════════════ */
function wmoToCondition(code) {
  if (code === 0) return "Ensolarado";
  if (code <= 2)  return "Parcialmente Nublado";
  if (code === 3) return "Nublado com Chuviscos";
  if (code <= 48) return "Nublado com Chuviscos";
  if (code <= 57) return "Nublado com Chuviscos";
  if (code <= 67) return "Chuva Moderada";
  if (code <= 82) return "Chuva Moderada";
  if (code === 95) return "Chuva com Trovoadas";
  return "Tempestade com Chuva Forte";
}

function degToDir(deg) {
  const dirs = ["N","NE","E","SE","S","SW","W","NW"];
  return dirs[Math.round((deg || 0) / 45) % 8];
}

function visFromCode(code) {
  if (code === 0) return 12;
  if (code <= 2)  return 10;
  if (code === 3) return 8;
  if (code <= 48) return 2;
  if (code <= 57) return 5;
  if (code <= 67) return 4;
  if (code <= 82) return 6;
  return 2;
}


function mapApiToUI(name, apiData) {
  const cur    = (apiData.weather && apiData.weather.current) || {};
  const risk   = apiData.risk || {};
  const raw    = risk.rawValues || {};
  const hourly = (apiData.weather && apiData.weather.hourly) || {};

  const wCode   = cur.weather_code || 0;
  const windDeg = cur.wind_direction_10m || 0;
  const windDir = degToDir(windDeg);
  const windSpd = Math.round(cur.wind_speed_10m || 0);

  /* Últimas 6 horas — índices 18–23 das 24h de histórico */
  const allPrecip = hourly.precipitation || [];
  const allTemps  = hourly.temperature_2m || [];
  const rain6h    = allPrecip.slice(18, 24).map(v => v != null ? Math.round(v * 10) / 10 : 0);
  const tempChart = allTemps.slice(18, 24).map(v => v != null ? Math.round(v) : Math.round(cur.temperature_2m || 0));
  while (rain6h.length  < 6) rain6h.unshift(0);
  while (tempChart.length < 6) tempChart.unshift(tempChart[0] || Math.round(cur.temperature_2m || 0));

  const baseTemp = Math.round(cur.temperature_2m || 0);
  const dailyForecast = ((apiData.forecastDaily) || []).slice(0, 6).map(f => ({
    high: f.high != null ? f.high : baseTemp,
    low:  f.low  != null ? f.low  : baseTemp - 4,
    rain: f.rain != null ? f.rain : 0,
  }));
  while (dailyForecast.length < 6) {
    dailyForecast.push({ high: baseTemp, low: baseTemp - 4, rain: 0 });
  }

  return {
    name,
    temp:          baseTemp,
    feelsLike:     Math.round(cur.apparent_temperature || cur.temperature_2m || 0),
    hydraScore:    risk.score || 0,
    condition:     wmoToCondition(wCode),
    wind:          `${windDir} ${windSpd} km/h`,
    windDeg,
    humidity:      Math.round(cur.relative_humidity_2m || 0),
    tide:          raw.mareAltura != null ? raw.mareAltura : 1.5,
    soil:          Math.round((raw.saturacaoSolo || 0) * 100),
    pressure:      Math.round(raw.pressao || cur.surface_pressure || 1013),
    visibility:    visFromCode(wCode),
    uv:            Math.round(raw.uvIndex != null ? raw.uvIndex : (cur.uv_index || 0)),
    rain6h,
    tempChart,
    forecast:      dailyForecast,
    bulletin:      "",
    others:        [],
    /* campos de risco detalhados para painel IA */
    chuvaPrevista: raw.chuvaPrevista != null ? raw.chuvaPrevista : 0,
    chuva24h:      raw.chuva24h      != null ? raw.chuva24h      : 0,
    rajadaVento:   raw.rajadaVento   != null ? Math.round(raw.rajadaVento) : windSpd,
    nivel:         risk.nivel || "BAIXO",
  };
}

async function apiFetchNarrative(cityName, riskData) {
  const res = await fetch('/api/narrative', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ cityName, riskData }),
  });
  if (!res.ok) throw new Error(`Narrative ${res.status}`);
  const d = await res.json();
  return d.narrative;
}

async function apiFetchScores(bairroNames) {
  const res = await fetch('/api/scores', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ bairros: bairroNames }),
  });
  if (!res.ok) throw new Error(`Scores ${res.status}`);
  const d = await res.json();
  return d.scores.map(s => ({ n: s.name, t: s.temp, s: s.score }));
}

/* ═══════════════════════════════════════════════════════
   SOUND MANAGER
═══════════════════════════════════════════════════════ */
class SoundManager {
  constructor() {
    this.ctx=null; this.rainSrc=null; this.rainGain=null;
    this.thunderTimer=null; this._pendingRain=null; this.enabled=true;
  }
  _boot() {
    if (!this.ctx) {
      try { this.ctx=new(window.AudioContext||window.webkitAudioContext)(); if(this._pendingRain){this._startRainNow(this._pendingRain);this._pendingRain=null;} }catch(e){}
    } else if(this.ctx.state==='suspended') this.ctx.resume();
  }
  playClick() {
    this._boot(); if(!this.enabled||!this.ctx)return;
    try{const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type="sine";o.frequency.value=880;const t=this.ctx.currentTime;g.gain.setValueAtTime(.07,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);o.start(t);o.stop(t+.07);}catch(e){}
  }
  playAlert(score) {
    if(!this.enabled||!this.ctx)return;
    try{const freqs=score>=85?[880,660,440,330]:score>=75?[660,550,440]:[550,440];freqs.forEach((f,i)=>{const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.frequency.value=f;o.type="sine";const t=this.ctx.currentTime+i*.22;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.16,t+.05);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);});}catch(e){}
  }
  playThunder() {
    if(!this.enabled||!this.ctx)return;
    try{const sr=this.ctx.sampleRate,dur=2.5+Math.random()*1.8,buf=this.ctx.createBuffer(1,Math.floor(sr*dur),sr),d=buf.getChannelData(0);let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;const pink=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926;d[i]=pink*Math.pow(Math.max(0,1-i/d.length),.55);}const src=this.ctx.createBufferSource();src.buffer=buf;const filt=this.ctx.createBiquadFilter();filt.type="lowpass";filt.frequency.value=160+Math.random()*100;filt.Q.value=.8;const gain=this.ctx.createGain(),t=this.ctx.currentTime;gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(.55+Math.random()*.25,t+.06);gain.gain.exponentialRampToValueAtTime(.001,t+dur);src.connect(filt);filt.connect(gain);gain.connect(this.ctx.destination);src.start(t);}catch(e){}
  }
  _startRainNow(intensity) {
    this.stopRain(); if(!this.ctx||!this.enabled)return;
    try{const sr=this.ctx.sampleRate,buf=this.ctx.createBuffer(1,sr*2,sr),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=this.ctx.createBufferSource();src.buffer=buf;src.loop=true;const f1=this.ctx.createBiquadFilter();f1.type="bandpass";f1.Q.value=.4;f1.frequency.value=intensity==="heavy"?1800:intensity==="normal"?1200:700;const gain=this.ctx.createGain(),vol=intensity==="heavy"?.09:intensity==="normal"?.055:.025;gain.gain.setValueAtTime(0,this.ctx.currentTime);gain.gain.linearRampToValueAtTime(vol,this.ctx.currentTime+1.5);src.connect(f1);f1.connect(gain);gain.connect(this.ctx.destination);src.start();this.rainSrc=src;this.rainGain=gain;}catch(e){}
  }
  startRain(intensity) {
    if(intensity==="none"||!this.enabled){this.stopRain();this._pendingRain=null;return;}
    if(!this.ctx){this._pendingRain=intensity;return;}
    this._startRainNow(intensity);
  }
  stopRain() {
    this._pendingRain=null;
    try{if(this.rainGain){this.rainGain.gain.setValueAtTime(this.rainGain.gain.value,this.ctx.currentTime);this.rainGain.gain.linearRampToValueAtTime(.001,this.ctx.currentTime+.8);}const src=this.rainSrc,gain=this.rainGain;setTimeout(()=>{try{src&&src.stop();src&&src.disconnect();gain&&gain.disconnect();}catch(e){}},900);this.rainSrc=null;this.rainGain=null;}catch(e){}
  }
  startThunderSchedule() {
    this.stopThunderSchedule();
    const schedule=()=>{this.thunderTimer=setTimeout(()=>{this.playThunder();schedule();},5000+Math.random()*14000);};schedule();
  }
  stopThunderSchedule(){if(this.thunderTimer){clearTimeout(this.thunderTimer);this.thunderTimer=null;}}
  setEnabled(v){this.enabled=v;if(!v){this.stopRain();this.stopThunderSchedule();}}
}
const soundMgr = new SoundManager();

/* ═══════════════════════════════════════════════════════  LOADING */
function LoadingScreen({ onDone }) {
  const [progress,setProgress]=useState(0);
  const [status,setStatus]=useState("Inicializando sistema...");
  const [out,setOut]=useState(false);
  const steps=useMemo(()=>[[200,0,"Inicializando sistema..."],[700,18,"Carregando bairros do Recife..."],[1300,40,"Obtendo dados climáticos..."],[1900,62,"Calculando Hydra Score..."],[2500,82,"Gerando boletim Defesa Civil..."],[3100,100,"Sistema pronto."]],[]);
  useEffect(()=>{
    const ts=steps.map(([at,p,s])=>setTimeout(()=>{setProgress(p);setStatus(s);},at));
    const t1=setTimeout(()=>setOut(true),3700),t2=setTimeout(onDone,4300);
    return()=>{ts.forEach(clearTimeout);clearTimeout(t1);clearTimeout(t2);};
  },[]);
  const drops=useMemo(()=>Array.from({length:55},(_,i)=>({id:i,l:Math.random()*110-5,h:12+Math.random()*10,d:Math.random()*3,dur:.7+Math.random()*.5})),[]);
  return (
    <div role="status" aria-label="Carregando HydraRec" aria-live="polite"
      style={{position:"fixed",inset:0,zIndex:1000,background:"linear-gradient(160deg,#0c0e13 0%,#111520 50%,#0c0e13 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:out?"loadScreenOut .6s ease forwards":"fadeIn .4s ease"}}>

/* ═══════════════════════════════════════════════════════  RAIN */
function Rain({ intensity }) {
  if(intensity==="none")return null;
  const count=intensity==="heavy"?120:intensity==="normal"?80:40;
  const drops=useMemo(()=>Array.from({length:count},(_,i)=>({id:i,left:Math.random()*110-5,height:intensity==="heavy"?18+Math.random()*14:12+Math.random()*10,delay:Math.random()*3,duration:intensity==="heavy"?.6+Math.random()*.4:.8+Math.random()*.6})),[intensity]);
  return <div className="rain-container">{drops.map(d=><div key={d.id} className={`rain-drop${intensity==="heavy"?" heavy":""}`} style={{left:`${d.left}%`,height:`${d.height}px`,top:0,animationDuration:`${d.duration}s`,animationDelay:`${d.delay}s`}}/>)}</div>;
}

/* ═══════════════════════════════════════════════════════  LIGHTNING */
function Lightning({ onFlash }) {
  const [flash,setFlash]=useState(false);
  useEffect(()=>{let t;const go=()=>{t=setTimeout(()=>{setFlash(true);onFlash&&onFlash();setTimeout(()=>setFlash(false),500);go();},4000+Math.random()*10000);};go();return()=>clearTimeout(t);},[]);
  if(!flash)return null;
  return <div aria-hidden="true" style={{position:"absolute",inset:0,zIndex:2,pointerEvents:"none",background:"rgba(220,228,255,.05)",animation:"lightning .5s ease"}}/>;
}

/* ═══════════════════════════════════════════════════════  WIND COMPASS */
function WindCompass({ deg, light }) {

  const dirs=["N","NE","E","SE","S","SW","W","NW"];

        {["N","E","S","W"].map((d,i)=><text key={d} x={i===0?18:i===1?31:i===2?18:5} y={i===0?7:i===2?33:21} textAnchor="middle" fontFamily="Outfit" fontSize="6" fill={tc}>{d}</text>)}

        </g>

/* ═══════════════════════════════════════════════════════  SPARKLINE */
function Sparkline({ data, color="#e8a030", width=160, height=50 }) {
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>[(i/(data.length-1))*width,height-((v-min)/range)*(height-10)-5]);
  const d="M "+pts.map(p=>p.join(",")).join(" L ");
  const area=`M ${pts[0].join(",")} L ${pts.map(p=>p.join(",")).join(" L ")} L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} style={{overflow:"visible"}} aria-hidden="true">
      <defs><linearGradient id="sgl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#sgl)"/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r="2.5" fill={color}/>)}
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════  FORECAST WAVE */
function ForecastWave({ forecast, width, height=58, light }) {
  const highs=forecast.map(f=>f.high);
  const min=Math.min(...highs)-2,max=Math.max(...highs)+2,range=max-min||1;
  const colW=width/forecast.length;
  const pts=highs.map((v,i)=>[i*colW+colW/2,height-((v-min)/range)*(height-12)-6]);
  let d=`M ${pts[0].join(",")}`;
  for(let i=1;i<pts.length;i++){const cx=pts[i-1][0]+(pts[i][0]-pts[i-1][0])/2;d+=` C ${cx},${pts[i-1][1]} ${cx},${pts[i][1]} ${pts[i].join(",")}`;}
  const area=d+` L ${pts[pts.length-1][0]},${height} L ${pts[0][0]},${height} Z`;
  const c=light?"#c97820":"#e8a030";
  return (
    <svg width={width} height={height} style={{position:"absolute",bottom:0,left:0,pointerEvents:"none"}} aria-hidden="true">
      <defs><linearGradient id="wgl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity=".22"/><stop offset="100%" stopColor={c} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#wgl)"/>
      <path d={d} fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════  SCORE RING */
function ScoreRing({ score, light, size=70 }) {
  const r=(size/2)-7,circ=2*Math.PI*r,offset=circ-(score/100)*circ,color=scoreColor(score);
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}} aria-hidden="true">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={light?"rgba(0,0,0,.1)":"rgba(255,255,255,.08)"} strokeWidth="4"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s ease,stroke .5s ease"}}/>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════  LIVE CLOCK */

      </div>
      <div style={{height:1,background:div}}/>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        <WindCompass deg={data.windDeg} light={light}/>
        <div>
          <div style={{fontSize:9,color:tc3,letterSpacing:".09em",textTransform:"uppercase",marginBottom:6}}>Risco</div>
          <div style={{display:"flex",gap:10}}>
            <div>
              <div style={{display:"flex",gap:3,marginBottom:4}}>{["#22c55e","#84cc16","#eab308"].map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}</div>
              <div style={{fontSize:9,color:tc3,lineHeight:1.75}}>0–19<br/>20–39<br/>40–59</div>
            </div>
            <div>
              <div style={{display:"flex",gap:3,marginBottom:4}}>{["#f97316","#ef4444"].map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}</div>
              <div style={{fontSize:9,color:tc3,lineHeight:1.75}}>60–74<br/>75–100</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{height:1,background:div}}/>
      <div className="fade-in" key={data.name+"s"}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:22,fontWeight:300,color:acc,letterSpacing:"-.5px"}}>{data.temp}°C</div>
          <div style={{fontSize:10,color:tc3,textAlign:"right"}}>
            <div>chuva 6h</div>
            <div style={{color:tc2,fontSize:12,marginTop:1}}>{data.rain6h.reduce((a,b)=>a+b,0).toFixed(1)}mm</div>
          </div>
        </div>
        <Sparkline data={data.tempChart} color={acc} width={186} height={48}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          {["Agora","1h","2h","3h","4h","5h"].map((h,i)=><span key={i} style={{fontSize:9,color:tc3}}>{h}</span>)}
        </div>
      </div>
      <div style={{flex:1}}/>
      <div style={{fontSize:8,color:tc3,letterSpacing:".14em",textTransform:"uppercase",textAlign:"center",paddingTop:4}}>HYDRAREC · DEFESA CIVIL PE</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════  APP */
function App() {
  const [ready,setReady]            = useState(false);
  const [bairro,setBairro]          = useState("Jordão");
  const [loading,setLoading]        = useState(false);
  const [data,setData]              = useState(null);
  const [waveWidth,setWaveWidth]    = useState(700);
  const [light,setLight]            = useState(()=>localStorage.getItem("hr_theme")==="light");
  const [soundOn,setSoundOn]        = useState(()=>localStorage.getItem("hr_sound")!=="off");
  const [sidebarOpen,setSidebarOpen]= useState(false);
  const [isMobile,setIsMobile]      = useState(()=>window.innerWidth<=768);
  const [prevScore,setPrevScore]    = useState(null);
  const waveRef = useRef(null);

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  useEffect(()=>{
    if(!waveRef.current)return;
    setWaveWidth(waveRef.current.offsetWidth);
    const ro=new ResizeObserver(()=>{if(waveRef.current)setWaveWidth(waveRef.current.offsetWidth);});
    ro.observe(waveRef.current);return()=>ro.disconnect();
  },[]);

  /* Carrega dados do bairro via API */
  const loadBairro = useCallback(async (name, isInitial=false) => {
    if (!isInitial) {
      setLoading(true);
      setBairro(name);
      setSidebarOpen(false);
      soundMgr.playClick();
    }
    try {
      const res = await fetch(`/api/dashboard/${encodeURIComponent(name)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const apiData = await res.json();

      const uiData = mapApiToUI(name, apiData);
      uiData.bulletin = "Gerando boletim IA...";
      const featured = FEATURED.filter(b => b !== name).slice(0, 5);
      uiData.others = featured.map(n => ({ n, t: "--", s: 0 }));
      setData(uiData);
      if (!isInitial) setLoading(false);

      /* Boletim IA e scores vizinhos em paralelo */
      const [narrativeRes, scoresRes] = await Promise.allSettled([
        apiFetchNarrative(name, apiData.risk),
        apiFetchScores(featured),
      ]);

      const bulletin = narrativeRes.status === 'fulfilled'
        ? narrativeRes.value
        : "IA indisponível no momento.";

      const others = scoresRes.status === 'fulfilled'
        ? scoresRes.value
        : featured.map(n => ({ n, t: 0, s: 0 }));

      setData(prev => prev ? { ...prev, bulletin, others } : prev);
    } catch(e) {
      console.error('loadBairro error:', e);
      if (!isInitial) setLoading(false);
    }
  }, []);

  useEffect(() => { loadBairro("Jordão", true); }, []);

  const condition = data?.condition || "Ensolarado";
  const theme = CONDITION_THEME[condition] || CONDITION_THEME["Ensolarado"];
  const bg    = light ? theme.lightBg : theme.darkBg;

  useEffect(()=>{
    if(!ready||!data)return;
    soundMgr.setEnabled(soundOn);
    if(soundOn&&theme.rain!=="none") soundMgr.startRain(theme.rain);
    else soundMgr.stopRain();
    return()=>soundMgr.stopRain();
  },[condition, soundOn, ready]);

  useEffect(()=>{
    if(!ready||!data)return;
    if(soundOn&&theme.hasThunder) soundMgr.startThunderSchedule();
    else soundMgr.stopThunderSchedule();
    return()=>soundMgr.stopThunderSchedule();
  },[condition, soundOn, ready]);

  useEffect(()=>{
    if(!ready||!data)return;
    if(prevScore!==null&&data.hydraScore>=60&&data.hydraScore>(prevScore||0)) soundMgr.playAlert(data.hydraScore);
    setPrevScore(data.hydraScore);
  },[data?.hydraScore, ready]);

  useEffect(()=>localStorage.setItem("hr_theme",light?"light":"dark"),[light]);
  useEffect(()=>localStorage.setItem("hr_sound",soundOn?"on":"off"),[soundOn]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape")setSidebarOpen(false);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const handleChange = useCallback(name => { loadBairro(name); }, [loadBairro]);
  const handleThemeToggle = () => { soundMgr.playClick(); setLight(v=>!v); };
  const handleSoundToggle = () => {
    soundMgr.playClick();
    setSoundOn(v=>{
      const next=!v; soundMgr.setEnabled(next);
      if(next&&theme.rain!=="none") soundMgr.startRain(theme.rain);
      if(next&&theme.hasThunder) soundMgr.startThunderSchedule();
      return next;
    });
  };

  const days=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const today=new Date();

  if(!ready) return <LoadingScreen onDone={()=>setReady(true)}/>;

  if(!data) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d0e11",flexDirection:"column",gap:16}}>
      <div style={{animation:"glowPulse 2s ease-in-out infinite"}}><HydraLogo size={44} showText={false}/></div>
      <div style={{fontFamily:"Outfit",fontSize:11,color:"rgba(255,255,255,.3)",letterSpacing:".18em",textTransform:"uppercase"}}>Conectando ao servidor...</div>
    </div>
  );

  const forecastDays=data.forecast.map((f,i)=>{const d=new Date(today);d.setDate(d.getDate()+i+1);return{...f,day:days[d.getDay()]};});
  const tc=light?"rgba(0,0,0,.82)":"#fff",tc2=light?"rgba(0,0,0,.45)":"rgba(255,255,255,.45)",tc3=light?"rgba(0,0,0,.28)":"rgba(255,255,255,.28)",div=light?"rgba(0,0,0,.08)":"rgba(255,255,255,.07)",sidebarBg=light?"rgba(238,232,222,.92)":"rgba(8,9,13,.87)",bottomBg=light?"rgba(218,212,200,.72)":"rgba(0,0,0,.3)";

  return (
    <div className={light?"light":""} style={{width:"100vw",height:"100vh",display:"flex",overflow:"hidden",fontFamily:"Outfit,sans-serif",background:bg,transition:"background 1.2s ease",animation:"fadeIn .6s ease"}}>

      {/* Atmospheric */}
      <div aria-hidden="true" style={{position:"absolute",inset:0,zIndex:0,pointerEvents:"none",background:`radial-gradient(ellipse 80% 60% at 70% 40%,rgba(${light?"140,145,155":"70,72,82"},${theme.cloud*.45}) 0%,transparent 70%)`,transition:"opacity 1s ease"}}/>
      <div aria-hidden="true" style={{position:"absolute",inset:0,zIndex:0,pointerEvents:"none",background:`radial-gradient(ellipse 55% 38% at 88% 18%,rgba(${light?"130,135,145":"90,90,100"},${theme.cloud*.3}) 0%,transparent 60%)`,animation:"cloudDrift 14s ease-in-out infinite"}}/>
      {theme.hasThunder&&<Lightning onFlash={()=>{ if(soundOn&&soundMgr.ctx) soundMgr.playThunder(); }}/>}
      <Rain intensity={theme.rain}/>

      {isMobile&&sidebarOpen&&<div className="mob-overlay" aria-hidden="true" onClick={()=>setSidebarOpen(false)}/>}

      {/* Sidebar */}
      <nav aria-label="Painel lateral" className={`sidebar-panel${isMobile&&sidebarOpen?" open":""}`}
        style={{width:isMobile?290:226,height:"100%",zIndex:isMobile?60:10,background:sidebarBg,backdropFilter:"blur(28px)",borderRight:`1px solid ${div}`}}>
        <Sidebar data={data} bairro={bairro} onChange={handleChange} light={light} soundOn={soundOn}
          onSoundToggle={handleSoundToggle} onThemeToggle={handleThemeToggle}
          onClose={isMobile?()=>setSidebarOpen(false):undefined}/>
      </nav>

      {/* Main */}
      <main id="main-content" tabIndex={-1} style={{flex:1,height:"100%",position:"relative",zIndex:5,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* Top bar */}
        <div style={{padding:isMobile?"14px 16px 0":"18px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {isMobile&&<button onClick={()=>{setSidebarOpen(true);soundMgr.playClick();}} aria-label="Abrir menu" style={{background:"none",border:"none",cursor:"pointer",padding:4,lineHeight:0}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={tc} strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>}
            <div style={{fontSize:10,color:tc3,letterSpacing:".15em",textTransform:"uppercase"}}>Previsão do Tempo</div>
            {loading&&<div aria-label="Carregando" style={{width:6,height:6,borderRadius:"50%",background:light?"#c97820":"#e8a030",animation:"pulse 1s ease infinite"}}/>}
          </div>
          <LiveClock light={light} compact={isMobile}/>
        </div>

        {/* Content row: weather + AI panel */}
        <div className="fade-in" key={data.name+"m"} style={{padding:isMobile?"14px 16px 0":"16px 28px 0",flex:1,display:"flex",flexDirection:"row",minHeight:0,gap:0,overflow:"hidden"}}>

          {/* Left: weather content */}
          <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,paddingRight:isMobile?0:28,overflow:"hidden"}}>
            <h1 style={{fontSize:isMobile?30:48,fontWeight:300,color:tc,lineHeight:1.05,letterSpacing:"-1.5px",maxWidth:500,marginBottom:12,textShadow:light?"none":"0 2px 50px rgba(0,0,0,.6)",textWrap:"pretty",animation:"slideInLeft .5s ease"}}>
              {data.condition}
            </h1>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={tc2} strokeWidth="1.5" aria-hidden="true"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
              <div style={{fontSize:11,color:tc2,letterSpacing:".03em"}}>Recife, PE · {today.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</div>
            </div>
            <div style={{marginBottom:14,flexShrink:0}}>
              <div style={{fontSize:isMobile?50:66,fontWeight:200,color:tc,letterSpacing:"-3px",lineHeight:1,animation:"numberPop .5s ease"}}>
                {data.temp}°
              </div>
              <div style={{fontSize:11,color:tc3,marginTop:4}}>Sensação {data.feelsLike}°C · {data.humidity}% umidade</div>
            </div>
            <div className="scroll-x" style={{display:"flex",gap:8,marginBottom:14,paddingBottom:2,flexShrink:0}}>
              <Chip label="UV" value={`${data.uv} · ${uvLabel(data.uv)}`} color={uvColor(data.uv)} light={light}/>
              <Chip label="Pressão" value={`${data.pressure} hPa`} light={light}/>
              <Chip label="Visibilidade" value={`${data.visibility} km`} light={light}/>
              <Chip label="Maré" value={`${data.tide}m`} light={light}/>
              <Chip label="Solo" value={`${data.soil}%`} color={data.soil>80?scoreColor(90):data.soil>60?scoreColor(55):undefined} light={light}/>
            </div>
            {/* Forecast */}
            <div ref={waveRef} style={{position:"relative",marginTop:"auto",flexShrink:0}}>
              <div className="scroll-x" style={{display:"flex",borderTop:`1px solid ${div}`,paddingTop:12}}>
                {forecastDays.map((f,i)=>(
                  <div key={i} style={{flex:"0 0 calc(100%/6)",textAlign:"center",minWidth:68}}>
                    <div style={{fontSize:9,color:tc3,letterSpacing:".07em",textTransform:"uppercase",marginBottom:4}}>{f.day}</div>
                    <div style={{fontSize:11,color:tc2,marginBottom:1}}>↑{f.high}°</div>
                    <div style={{fontSize:10,color:tc3,marginBottom:5}}>↓{f.low}°</div>
                    <div style={{height:2,background:light?"rgba(0,0,0,.08)":"rgba(255,255,255,.08)",borderRadius:1,overflow:"hidden",margin:"0 auto",width:"60%"}}>
                      <div style={{height:"100%",width:`${f.rain}%`,background:`rgba(${light?"80,130,200":"140,180,255"},.6)`,borderRadius:1,transition:"width .8s ease"}}/>
                    </div>
                    <div style={{fontSize:8,color:tc3,marginTop:3}}>{f.rain}%</div>
                  </div>
                ))}
              </div>
              <div style={{position:"relative",height:54,marginTop:4}}>
                <ForecastWave forecast={forecastDays} width={waveWidth} height={54} light={light}/>
              </div>
            </div>
          </div>

          {/* Right: AI bulletin panel — desktop only */}
          {!isMobile && (
            <div style={{width:264,flexShrink:0,borderLeft:`1px solid ${div}`,paddingLeft:24,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <AIBulletinPanel data={data} light={light}/>
            </div>
          )}
        </div>

        {/* Bottom bar */}
        <nav aria-label="Outros bairros" className="scroll-x" style={{display:"flex",borderTop:`1px solid ${div}`,background:bottomBg,backdropFilter:"blur(14px)",flexShrink:0}}>
          {data.others.map((o,i)=>{
            const oc=scoreColor(typeof o.s==='number'?o.s:0);
            return (
              <button key={i} onClick={()=>handleChange(o.n)} aria-label={`${o.n}: ${o.t}°C, score ${o.s}`}
                style={{flex:"0 0 20%",minWidth:90,padding:"11px 12px",borderRight:`1px solid ${div}`,borderTop:"none",borderBottom:"none",borderLeft:"none",background:"transparent",cursor:"pointer",textAlign:"left",transition:"background .18s",fontFamily:"Outfit"}}
                onMouseEnter={e=>e.currentTarget.style.background=light?"rgba(0,0,0,.04)":"rgba(255,255,255,.04)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{fontSize:20,fontWeight:200,color:tc,letterSpacing:"-.5px",marginBottom:1}}>{o.t}{typeof o.t==='number'?"°":""}</div>
                <div style={{fontSize:9,color:tc2,marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.n}</div>
                <div style={{height:2,background:light?"rgba(0,0,0,.1)":"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${typeof o.s==='number'?o.s:0}%`,background:oc,borderRadius:2,transition:"width .8s ease"}}/>
                </div>
                <div style={{fontSize:8,color:tc3,marginTop:2}}>{typeof o.s==='number'?`Score ${o.s}`:"..."}</div>
              </button>
            );
          })}
        </nav>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
